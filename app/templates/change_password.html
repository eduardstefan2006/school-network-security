{% extends "base.html" %}

{% block title %}Schimbă Parola - SchoolSec{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card schoolsec-card border-secondary shadow-lg">
            <div class="card-body p-4">
                <!-- Titlu -->
                <div class="text-center mb-4">
                    <i class="bi bi-key-fill text-warning" style="font-size: 2.5rem;"></i>
                    <h3 class="mt-2 text-light fw-bold">Schimbă Parola</h3>
                    <p class="text-muted small">Completați câmpurile de mai jos pentru a vă schimba parola.</p>
                </div>

                <!-- Formular -->
                <form method="POST" action="{{ url_for('auth.change_own_password') }}">
                    <div class="mb-3">
                        <label for="current_password" class="form-label text-light">
                            <i class="bi bi-lock me-1"></i>Parola curentă
                        </label>
                        <input type="password" class="form-control schoolsec-input text-light border-secondary"
                               id="current_password" name="current_password" required
                               autocomplete="current-password">
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label text-light">
                            <i class="bi bi-lock-fill me-1"></i>Parola nouă
                        </label>
                        <input type="password" class="form-control schoolsec-input text-light border-secondary"
                               id="new_password" name="new_password" required
                               placeholder="Minim 6 caractere"
                               autocomplete="new-password">
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label text-light">
                            <i class="bi bi-lock-fill me-1"></i>Confirmă parola nouă
                        </label>
                        <input type="password" class="form-control schoolsec-input text-light border-secondary"
                               id="confirm_password" name="confirm_password" required
                               autocomplete="new-password">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-key me-2"></i>Schimbă Parola
                        </button>
                        <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>Anulare
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
