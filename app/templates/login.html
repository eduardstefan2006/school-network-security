{% extends "base.html" %}

{% block title %}Autentificare - SchoolSec{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <!-- Card de login -->
        <div class="card schoolsec-card border-secondary shadow-lg">
            <div class="card-body p-4">
                <!-- Logo și titlu -->
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill text-success" style="font-size: 3rem;"></i>
                    <h2 class="mt-2 text-success fw-bold">SchoolSec</h2>
                    <p class="text-muted small">Sistem de Securitate pentru Rețeaua Școlii</p>
                </div>

                <!-- Formularul de login -->
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label text-light">
                            <i class="bi bi-person me-1"></i>Nume utilizator
                        </label>
                        <input type="text" class="form-control schoolsec-input text-light border-secondary"
                               id="username" name="username" required
                               placeholder="Introduceți username-ul"
                               autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label text-light">
                            <i class="bi bi-lock me-1"></i>Parolă
                        </label>
                        <input type="password" class="form-control schoolsec-input text-light border-secondary"
                               id="password" name="password" required
                               placeholder="Introduceți parola"
                               autocomplete="current-password">
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label text-muted" for="remember">
                            Ține-mă minte
                        </label>
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Autentificare
                    </button>
                </form>

                <!-- Credențiale demo -->
                <hr class="border-secondary mt-4">
                <div class="text-center">
                    <p class="text-muted small mb-1">Credențiale implicite:</p>
                    <code class="text-success small">admin / Admin123</code>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
